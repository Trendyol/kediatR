project:
  name: kediatR
  description: Mediator implementation in Kotlin with native coroutine support
  license: MIT
  links:
    homepage: https://github.com/Trendyol/kediatR
    documentation: https://github.com/Trendyol/kediatR
    bugTracker: https://github.com/Trendyol/kediatR/issues
  authors:
    - Oguzhan Soykan
  inceptionYear: "2019"

release:
  github:
    owner: Trendyol
    name: kediatR
    tagName: "v{{projectVersion}}"
    releaseName: "v{{projectVersion}}"
    overwrite: false
    skipTag: false
    changelog:
      enabled: true
      formatted: ALWAYS
      preset: conventional-commits
      contributors:
        enabled: false
      hide:
        categories:
          - merge
        contributors:
          - "[bot]"
          - "GitHub"
